services:
  - type: web
    name: crediclass-dashboard-v3
    runtime: python
    buildCommand: pip install --no-cache-dir -r requirements.txt
    startCommand: python -m uvicorn backend.main:app --host 0.0.0.0 --port $PORT --no-access-log --timeout-keep-alive 5
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: "false"
      - key: GOOGLE_SHEETS_ID
        sync: false
      - key: GOOGLE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: GOOGLE_SHEET_NAME
        sync: false
